<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | White Banger</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="assets/img/icon.svg">
  <link rel="canonical" href="https://whitebanger.org/404.html" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      color: white;
      max-width: 600px;
    }

    .error-code {
      font-size: clamp(80px, 20vw, 180px);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    h1 {
      font-size: clamp(24px, 5vw, 42px);
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      font-size: clamp(16px, 3vw, 20px);
      margin-bottom: 40px;
      opacity: 0.9;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      opacity: 0.9;
    }

    @media (max-width: 640px) {
      .buttons {
        flex-direction: column;
        width: 100%;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/css/naisc-nav.css" />
  <link rel="stylesheet" href="assets/css/wb-header-v2.css" />
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="90" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="4"/>
        <path d="M70 80 L130 80 M70 120 L130 120 M85 100 L115 100" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <circle cx="75" cy="80" r="8" fill="white"/>
        <circle cx="125" cy="80" r="8" fill="white"/>
      </svg>
    </div>

    <div class="error-code">404</div>

    <h1>Oops! Page Not Found</h1>

    <p>
      The page you're looking for seems to have wandered off into the digital wilderness.
      Don't worry though, we'll help you get back on track!
    </p>

    <div class="buttons">
      <a href="/" class="btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Go Home
      </a>

      <a href="contact.html" class="btn btn-secondary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Contact Us
      </a>
    </div>
  </div>

  <script>
    // If accessed directly, wait a moment then redirect to home
    if (window.location.pathname === '/404.html') {
      setTimeout(() => {
        const redirectTimeout = setTimeout(() => {
          window.location.href = '/';
        }, 5000);

        // Cancel redirect if user interacts
        document.querySelectorAll('.btn').forEach(btn => {
          btn.addEventListener('click', () => clearTimeout(redirectTimeout));
        });
      }, 100);
    }
  </script>
  <!-- Firebase Database Integration -->
  <script type="module" src="assets/js/wb-database.js"></script>
</body>
</html>
