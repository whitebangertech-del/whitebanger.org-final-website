<svg viewBox="-20 -50 200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .w-path { fill: none; stroke: #0066FF; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .box { fill: none; stroke: #0066FF; stroke-width: 4; }
      .arrow { fill: none; stroke: #0066FF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .pixel { fill: #0066FF; }
    </style>
  </defs>
  <g>
    <!-- W -->
    <path class="w-path" d="M 0 10 L 25 80 L 50 30 L 75 80 L 105 30" />
    
    <!-- O - overlapping -->
    <path class="w-path" d="M 105 80 C 130 80, 160 80, 160 45 C 160 10, 130 10, 105 35" />

    <!-- Box and arrow -->
    <g transform="translate(85, -20)">
      <rect class="box" x="0" y="0" width="18" height="18" />
      <path class="arrow" d="M 4 14 L 14 4 M 14 4 L 6 4 M 14 4 L 14 12" />
      
      <!-- pixels -->
      <rect class="pixel" x="22" y="-10" width="8" height="8" />
      <rect class="pixel" x="32" y="2" width="10" height="10" />
      <rect class="pixel" x="34" y="-12" width="6" height="6" />
      <rect class="pixel" x="42" y="-4" width="4" height="4" />
    </g>
  </g>
</svg>
