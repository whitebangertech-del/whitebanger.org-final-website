<svg viewBox="0 0 550 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .w-path, .o-path { fill: none; stroke: #0066FF; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .text-edu { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 500; fill: #0066FF; text-transform: uppercase; letter-spacing: 0.5px; }
      .text-no1 { font-family: 'Inter', sans-serif; font-size: 52px; font-weight: 400; font-stretch: condensed; fill: #0066FF; letter-spacing: -1px; }
      .box { fill: none; stroke: #0066FF; stroke-width: 4; }
      .arrow { fill: none; stroke: #0066FF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .pixel { fill: #0066FF; }
      /* The hidden or faint text */
      .text-will { font-family: 'Inter', sans-serif; font-size: 42px; font-weight: 700; fill: #ffffff; letter-spacing: 8px; opacity: 1; }
    </style>
  </defs>

  <!-- Logo Mark -->
  <g transform="translate(15, 20)">
    <!-- W -->
    <path class="w-path" d="M 0 10 L 25 80 L 50 30 L 75 80 L 105 30" />
    
    <!-- O - overlapping -->
    <path class="w-path" d="M 105 80 C 130 80, 160 80, 160 45 C 160 10, 130 10, 105 35" />

    <!-- Box and arrow -->
    <g transform="translate(85, -20)">
      <rect class="box" x="0" y="0" width="18" height="18" />
      <path class="arrow" d="M 4 14 L 14 4 M 14 4 L 6 4 M 14 4 L 14 12" />
      
      <!-- pixels -->
      <rect class="pixel" x="22" y="-10" width="8" height="8" />
      <rect class="pixel" x="32" y="2" width="10" height="10" />
      <rect class="pixel" x="34" y="-12" width="6" height="6" />
      <rect class="pixel" x="42" y="-4" width="4" height="4" />
    </g>
  </g>

  <!-- Text sections -->
  <text class="text-will" x="180" y="60">WILL FOR ALL</text>
  <text class="text-edu" x="180" y="88">EDUCATION WITH A BANG!</text>

  <text class="text-no1" x="440" y="88">NO.1</text>
</svg>
